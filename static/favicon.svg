<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
	<rect width="32" height="32" rx="6" fill="#0f0a1f" />
	<!-- Brush handle (angled) -->
	<line x1="22" y1="6" x2="12" y2="16" stroke="#e879f9" stroke-width="2.4" stroke-linecap="round" />
	<!-- Brush bristles (small triangular) -->
	<path
		d="M12 16 L 8 22 L 14 22 Z"
		fill="#22d3ee"
		stroke="#22d3ee"
		stroke-width="1"
		stroke-linejoin="round"
	/>
	<!-- Question mark hint near the brush tip -->
	<text
		x="22"
		y="26"
		font-family="ui-sans-serif, system-ui, sans-serif"
		font-size="13"
		font-weight="700"
		fill="#fde047"
		text-anchor="middle"
	>?</text>
</svg>
